name: E-commerce CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: kapt-api-backend
  S3_BUCKET: kapt-diecast
  CLOUDFRONT_DISTRIBUTION_ID: E1VJ8L0WCU3FXH

jobs:
  backend-test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Run backend tests
        run: |
          cd backend
          echo "Skipping backend unit tests for now because pytest is not configured!"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Set up kubectl
        if: github.event_name == 'push'
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Update kubeconfig for EKS
        if: github.event_name == 'push'
        env:
          EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
        run: |
          CLUSTER_NAME="${EKS_CLUSTER_NAME:-kapt-cluster-dev}"
          echo "Using EKS cluster: $CLUSTER_NAME"
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "${{ env.AWS_REGION }}"

      - name: Sync backend secret from GitHub secrets
        if: github.event_name == 'push'
        env:
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          MYSQL_USER_SECRET: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD_SECRET: ${{ secrets.MYSQL_PASSWORD }}
          AWS_ACCESS_KEY_ID_SECRET: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          NAMESPACE="${K8S_NAMESPACE:-default}"
          MYSQL_USER_VALUE="${MYSQL_USER_SECRET:-admin}"
          MYSQL_PASSWORD_VALUE="${MYSQL_PASSWORD_SECRET:-Kaptdiecast2026!}"

          if [ -z "$AWS_ACCESS_KEY_ID_SECRET" ] || [ -z "$AWS_SECRET_ACCESS_KEY_SECRET" ]; then
            echo "Missing AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY in GitHub secrets"
            exit 1
          fi

          kubectl create secret generic kapt-secret \
            --namespace "$NAMESPACE" \
            --from-literal=MYSQL_USER="$MYSQL_USER_VALUE" \
            --from-literal=MYSQL_PASSWORD="$MYSQL_PASSWORD_VALUE" \
            --from-literal=AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID_SECRET" \
            --from-literal=AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy latest backend image to Kubernetes
        if: github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          NAMESPACE="${K8S_NAMESPACE:-default}"
          kubectl set image deployment/kapt-api \
            fastapi-app="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --namespace "$NAMESPACE"
          kubectl rollout restart deployment/kapt-api --namespace "$NAMESPACE"
          kubectl rollout status deployment/kapt-api --namespace "$NAMESPACE" --timeout=180s

  frontend-build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION }}
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_SIGN_IN_REDIRECT_URL: ${{ vars.VITE_COGNITO_SIGN_IN_REDIRECT_URL }}
          VITE_COGNITO_SIGN_OUT_REDIRECT_URL: ${{ vars.VITE_COGNITO_SIGN_OUT_REDIRECT_URL }}
          VITE_COGNITO_SIGN_IN_REDIRECT_URL_PROD: ${{ vars.VITE_COGNITO_SIGN_IN_REDIRECT_URL_PROD }}
          VITE_COGNITO_SIGN_OUT_REDIRECT_URL_PROD: ${{ vars.VITE_COGNITO_SIGN_OUT_REDIRECT_URL_PROD }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: |
          cd frontend
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync UI to Amazon S3
        run: |
          aws s3 sync frontend/dist s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          if [ "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" != "YOUR_DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
          else
            echo "Skipping CloudFront invalidation because distribution ID is a placeholder."
          fi
